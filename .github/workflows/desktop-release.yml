# 三平台桌面壳：push desktop/ 到 main → 构建 Win/Mac/Linux → 上传 GitHub Release
# electron-builder 必须在对应 OS 上构建（Mac 包无法在 Windows runner 上打）
name: Desktop release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-release.yml'
    tags:
      - 'desktop-v*'

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
        working-directory: desktop
      - run: npm run dist:win
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: desktop/release/*.exe
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
        working-directory: desktop
      - run: npm run dist:mac
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: desktop/release/*.dmg
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
        working-directory: desktop
      - run: npm run dist:linux
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: desktop/release/*.AppImage
          if-no-files-found: error

  release:
    needs: [build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: >-
      needs.build-win.result == 'success' &&
      needs.build-mac.result == 'success' &&
      needs.build-linux.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: desktop-*
          merge-multiple: true

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./desktop/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: meta
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          if [[ "${GITHUB_REF}" == refs/tags/desktop-v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=Desktop ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=desktop-v${VERSION}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "name=Desktop v${VERSION} (main build ${GITHUB_RUN_NUMBER})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: release-assets/**/*
