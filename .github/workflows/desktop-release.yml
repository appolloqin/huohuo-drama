# 三平台桌面壳安装包（electron-builder 必须在对应 OS 上构建）
# Win 包请在 windows-latest；Mac 包必须在 macos-latest（无法在 Windows 上打 dmg）
name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
        working-directory: desktop
      - run: npm run dist:win
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: desktop/release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
        working-directory: desktop
      - run: npm run dist:mac
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: desktop/release/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
        working-directory: desktop
      - run: npm run dist:linux
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: desktop/release/*.AppImage
