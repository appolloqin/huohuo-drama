# 可选：与 docker-compose.full.yml 联用的 MySQL 服务
# 用法：cp .env.example .env 并设置 DB_DRIVER=mysql
#       docker compose -f docker-compose.full.yml -f docker-compose.mysql.yml up -d --build

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-huohuo_drama}
      MYSQL_USER: ${MYSQL_DB_USER:-huohuo}
      MYSQL_PASSWORD: ${MYSQL_DB_PASSWORD:-secret!}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret!}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  huohuo-drama-full:
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_DRIVER=mysql
      - DATABASE_URL=mysql://${MYSQL_USER:-huohuo}:${MYSQL_PASSWORD:-secret!}@mysql:3306/${MYSQL_DATABASE:-huohuo_drama}
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER:-huohuo}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-secret!}
      - MYSQL_IMPORT_SQL=${MYSQL_IMPORT_SQL:-true}
      - MYSQL_IMPORT_FILE=${MYSQL_IMPORT_FILE:-/app/workbench-data/huohuo_drama.sql}

volumes:
  mysql_data:
